name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, gd, intl, zip
          coverage: none

      - name: Validar secrets de deploy
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="${missing} VPS_HOST"
          [ -z "${{ secrets.VPS_USERNAME }}" ] && missing="${missing} VPS_USERNAME"
          [ -z "${{ secrets.VPS_PASSWORD }}" ] && missing="${missing} VPS_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Secrets ausentes ou vazios:$missing. Configure no repositório ou na org (com acesso a este repo)."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /var/www/ai-gateway
            git fetch origin main
            git reset --hard origin/main
            composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

      - name: Notify deployment success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment failed!"
